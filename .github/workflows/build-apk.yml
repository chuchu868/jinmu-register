name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies (修复Java版本)
      run: |
        sudo apt-get update
        # 安装 Java 17 而非 11
        sudo apt-get install -y \
          python3-pip \
          python3-venv \
          build-essential \
          git \
          zip \
          unzip \
          wget \
          curl \
          openjdk-17-jdk \
          openjdk-17-jre \
          libffi-dev \
          libssl-dev \
          zlib1g-dev
        
        # 验证Java版本
        echo "Java版本检查:"
        java -version
        javac -version
    
    - name: Set JAVA_HOME
      run: |
        # 设置JAVA_HOME环境变量
        JAVA_HOME_17=$(dirname $(dirname $(readlink -f $(which javac))))
        echo "JAVA_HOME=$JAVA_HOME_17" >> $GITHUB_ENV
        echo "JAVA_HOME设置为: $JAVA_HOME_17"
    
    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install buildozer cython
        buildozer --version
    
    - name: Setup Android SDK environment
      run: |
        # 设置Android SDK主目录
        export ANDROID_SDK_ROOT="$HOME/android_sdk"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        
        # 创建目录结构
        mkdir -p $ANDROID_SDK_ROOT
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        mkdir -p $ANDROID_SDK_ROOT/licenses
        
        echo "Android SDK将安装到: $ANDROID_SDK_ROOT"
    
    - name: Install Android Command Line Tools
      run: |
        ANDROID_SDK_ROOT="$HOME/android_sdk"
        
        # 下载命令行工具
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        
        # 解压到正确位置
        mkdir -p cmdline-tools-tmp
        unzip -q commandlinetools-linux-11076708_latest.zip -d cmdline-tools-tmp
        
        # 移动到SDK目录
        mv cmdline-tools-tmp/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
        
        # 清理临时文件
        rm -rf cmdline-tools-tmp commandlinetools-linux-11076708_latest.zip
        
        echo "命令行工具安装完成:"
        ls -la $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/
    
    - name: Accept Android SDK licenses
      run: |
        ANDROID_SDK_ROOT="$HOME/android_sdk"
        
        # 创建许可证文件（避免交互式提示）
        mkdir -p $ANDROID_SDK_ROOT/licenses
        echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo -e "84831b9409646a918e30573b4d6c4b54d7d3137c" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
        
        echo "Android SDK许可证已接受"
        cat $ANDROID_SDK_ROOT/licenses/*
    
    - name: Install Android SDK components (修复AIDL问题)
      run: |
        ANDROID_SDK_ROOT="$HOME/android_sdk"
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
        
        echo "安装Android SDK组件..."
        
        # 安装platform-tools
        yes | sdkmanager "platform-tools" 2>&1 | tail -20
        
        # 安装build-tools 33.0.0（包含AIDL）
        yes | sdkmanager "build-tools;33.0.0" 2>&1 | tail -20
        
        # 安装platforms
        yes | sdkmanager "platforms;android-33" 2>&1 | tail -20
        
        # 验证AIDL工具
        echo "验证AIDL工具安装:"
        if [ -f "$ANDROID_SDK_ROOT/build-tools/33.0.0/aidl" ]; then
          echo "✅ AIDL工具存在: $ANDROID_SDK_ROOT/build-tools/33.0.0/aidl"
          ls -la "$ANDROID_SDK_ROOT/build-tools/33.0.0/aidl"
        else
          echo "❌ AIDL工具未找到，检查构建工具目录:"
          ls -la "$ANDROID_SDK_ROOT/build-tools/" || echo "构建工具目录不存在"
        fi
        
        echo "已安装的SDK组件:"
        sdkmanager --list_installed 2>&1 | grep -E "platform|build-tools|platform-tools" || true
    
    - name: Cache Buildozer dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Pre-build validation
      run: |
        echo "=== 预构建验证 ==="
        echo "工作目录: $(pwd)"
        echo "文件列表:"
        ls -la
        
        echo "主脚本检查:"
        if [ -f "main.py" ]; then
          echo "✅ 找到主脚本: main.py"
          head -5 main.py
        else
          echo "❌ 未找到main.py，请确保已重命名主脚本"
          ls -la *.py
        fi
        
        echo "buildozer.spec检查:"
        if [ -f "buildozer.spec" ]; then
          echo "✅ 找到buildozer.spec"
          grep -E "title|entrypoint|requirements" buildozer.spec
        else
          echo "❌ 未找到buildozer.spec"
        fi
        
        echo "环境变量:"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "JAVA_HOME: $JAVA_HOME"
        echo "Java版本:"
        java -version 2>&1
        echo "=================="
    
    - name: Build APK
      run: |
        # 设置环境变量
        export ANDROID_SDK_ROOT="$HOME/android_sdk"
        export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
        
        echo "开始构建APK (首次构建需要15-30分钟)..."
        
        # 清理之前的构建
        rm -rf bin/ .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 使用详细模式构建，并保存日志
        timeout 1800 buildozer -v android debug 2>&1 | tee build_output.log
        
        BUILD_STATUS=${PIPESTATUS[0]}
        
        echo "构建完成，退出代码: $BUILD_STATUS"
        
        if [ $BUILD_STATUS -eq 0 ]; then
          echo "✅ APK构建成功!"
          echo "生成的APK文件:"
          find bin/ -name "*.apk" -type f 2>/dev/null | xargs ls -lh
        else
          echo "❌ APK构建失败!"
          echo "最后100行错误输出:"
          tail -100 build_output.log
          
          # 查找更详细的错误
          echo "查找详细错误日志..."
          find .buildozer -name "*.log" -type f 2>/dev/null | head -3 | while read log; do
            echo "=== 错误日志: $(basename $log) ==="
            tail -50 "$log"
          done
        fi
        
        # 保存构建日志
        exit $BUILD_STATUS
      timeout-minutes: 45
    
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build_output.log
          .buildozer/**/*.log
        retention-days: 3
