name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 关键修复：使用 22.04 以确保 libncurses5 可用
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        # 关键修复：移除了 ubuntu 24.04 中不存在的 libncurses5
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          wget \
          openjdk-17-jdk \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        # 只安装构建工具，kivy会在构建过程中由buildozer管理
        pip install buildozer cython

    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK
      run: |
        echo "=== 构建环境检查 ==="
        echo "工作目录: $(pwd)"
        echo "主脚本文件:"
        ls -la *.py || echo "无.py文件"
        echo "spec文件:"
        cat buildozer.spec || echo "无spec文件"
        echo "==================="
        
        # 清理旧构建
        rm -rf bin/ .buildozer/android/platform/build-* 2>/dev/null || true
        
        echo "开始构建APK (这需要较长时间，将下载Android SDK/NDK)..."
        # 使用verbose模式获取详细日志
        buildozer -v android debug
        BUILD_STATUS=$?
        
        echo "构建完成，退出代码: $BUILD_STATUS"
        
        if [ $BUILD_STATUS -eq 0 ]; then
            echo "✅ APK构建成功！"
            echo "生成的APK文件:"
            ls -lh bin/*.apk
        else
            echo "❌ APK构建失败！"
            # 输出关键错误日志
            find .buildozer -name "*.log" -type f 2>/dev/null | head -3 | while read log; do
                echo "=== 错误日志: $log ==="
                tail -50 "$log"
            done
        fi
        
        exit $BUILD_STATUS
      timeout-minutes: 30  # 根据网络情况，首次构建可能需更久

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-logs
        path: |
          .buildozer/
        retention-days: 3
