name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # 修复 Node.js 版本警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies (修复Java版本)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          python3-venv \
          build-essential \
          git \
          zip \
          unzip \
          wget \
          curl \
          openjdk-17-jdk \
          openjdk-17-jre \
          libffi-dev \
          libssl-dev \
          zlib1g-dev
        
        echo "Java版本:"
        java -version
    
    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install "buildozer==1.5.0"
        pip install "cython==0.29.36"
        pip install "setuptools==65.5.0"
    
    - name: Setup Android SDK
      run: |
        export ANDROID_SDK_ROOT="$HOME/android_sdk"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        mkdir -p $ANDROID_SDK_ROOT
        echo "Android SDK路径: $ANDROID_SDK_ROOT"
    
    - name: Accept Android SDK licenses
      run: |
        ANDROID_SDK_ROOT="$HOME/android_sdk"
        mkdir -p $ANDROID_SDK_ROOT/licenses
        
        echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
        echo -e "84831b9409646a918e30573b4d6c4b54d7d3137c" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
        
        echo "Android SDK许可证已接受"
    
    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Build APK
      run: |
        echo "=== 构建环境检查 ==="
        echo "工作目录: $(pwd)"
        echo "文件列表:"
        ls -la
        
        if [ ! -f "main.py" ]; then
          echo "❌ 错误: 未找到 main.py 文件"
          echo "请确保已将 '网页式金木自动注册.py' 重命名为 'main.py'"
          exit 1
        fi
        
        echo "✅ 找到主脚本: main.py"
        
        # 设置编译环境变量，解决Cython问题
        export CFLAGS="-D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64"
        export CXXFLAGS="-D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64"
        
        echo "开始构建APK (首次构建需要20-40分钟)..."
        
        # 清理旧构建
        rm -rf bin/ .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 构建命令
        timeout 2400 buildozer -v android debug 2>&1 | tee build_output.log
        
        BUILD_STATUS=${PIPESTATUS[0]}
        
        echo "构建完成，退出代码: $BUILD_STATUS"
        
        if [ $BUILD_STATUS -eq 0 ]; then
          echo "✅ APK构建成功!"
          echo "生成的APK文件:"
          find bin/ -name "*.apk" -type f 2>/dev/null | xargs ls -lh
        else
          echo "❌ APK构建失败!"
          echo "最后50行错误日志:"
          tail -50 build_output.log
          
          # 检查是否有Cython错误
          if grep -q "undeclared name not builtin: long" build_output.log; then
            echo "⚠️  检测到Cython编译错误，尝试应急修复..."
            echo "这可能需要调整buildozer.spec中的版本配置"
          fi
        fi
        
        exit $BUILD_STATUS
      timeout-minutes: 45
    
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build_output.log
          .buildozer/**/*.log
        retention-days: 3
