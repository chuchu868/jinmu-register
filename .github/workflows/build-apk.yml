name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          wget \
          curl \
          openjdk-17-jdk \
          libffi-dev \
          libssl-dev \
          zlib1g-dev
        
        # 验证 Java 版本
        echo "Java版本:"
        java -version
    
    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        # 安装最新版 Buildozer
        pip install buildozer cython
        
        echo "Buildozer版本:"
        buildozer --version
    
    - name: Cache Buildozer dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Pre-build setup
      run: |
        echo "=== 预构建检查 ==="
        echo "工作目录: $(pwd)"
        echo "文件列表:"
        ls -la
        
        # 检查主脚本
        if [ -f "main.py" ]; then
          echo "✅ 找到主脚本: main.py"
        else
          echo "❌ 未找到 main.py"
          echo "请确保已将 '网页式金木自动注册.py' 重命名为 'main.py'"
          exit 1
        fi
        
        # 检查 buildozer.spec
        if [ -f "buildozer.spec" ]; then
          echo "✅ 找到 buildozer.spec"
          echo "当前配置:"
          grep -E "title|entrypoint|requirements|android\." buildozer.spec || true
        else
          echo "❌ 未找到 buildozer.spec"
          exit 1
        fi
    
    - name: Build APK (使用 Buildozer 自动管理)
      run: |
        echo "开始构建 APK..."
        echo "注意：首次构建需要下载 Android SDK/NDK，可能需要 20-40 分钟"
        
        # 清理之前的构建
        rm -rf bin/ .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 设置详细日志级别并开始构建
        timeout 3600 buildozer -v android debug 2>&1 | tee build_output.log
        
        BUILD_STATUS=${PIPESTATUS[0]}
        
        if [ $BUILD_STATUS -eq 0 ]; then
          echo "✅ APK 构建成功!"
          echo "生成的 APK 文件:"
          find bin/ -name "*.apk" -type f 2>/dev/null | xargs ls -lh || echo "未找到 APK 文件"
        else
          echo "❌ APK 构建失败!"
          echo "=== 错误摘要 ==="
          
          # 检查常见错误
          if grep -q "unknown revision or path not in the working tree" build_output.log; then
            echo "检测到 git 版本问题，请检查 buildozer.spec 中的 p4a.commit 设置"
          fi
          
          if grep -q "Command failed" build_output.log; then
            echo "检测到命令执行失败，查看详细日志:"
            grep -A5 -B5 "Command failed" build_output.log | head -20
          fi
          
          echo "=== 最后 50 行日志 ==="
          tail -50 build_output.log
        fi
        
        exit $BUILD_STATUS
      timeout-minutes: 60
    
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7
    
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-logs
        path: |
          build_output.log
          .buildozer/**/*.log
        retention-days: 3
