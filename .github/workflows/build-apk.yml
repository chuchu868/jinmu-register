name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Pre-build setup
      run: |
        echo "=== 预构建检查 ==="
        echo "工作目录: $(pwd)"
        echo "文件列表:"
        ls -la
        
        if [ ! -f "main.py" ]; then
          echo "❌ 错误: 未找到 main.py 文件"
          echo "请将 '网页式金木自动注册.py' 重命名为 'main.py'"
          exit 1
        fi
        
        if [ ! -f "buildozer.spec" ]; then
          echo "❌ 错误: 未找到 buildozer.spec 文件"
          exit 1
        fi
        
        echo "✅ 必要文件检查通过"

    - name: Build APK with enhanced fix
      id: build-step
      run: |
        echo "=== 开始构建 APK (增强修复模式) ==="
        echo "首次构建可能需要 10-20 分钟..."
        
        # 清理旧构建
        rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
        
        echo "阶段 1: 首次构建 (预期会失败)..."
        # 首次构建，预期会因 long 错误而失败
        timeout 600 buildozer -v android debug 2>&1 | tee first_build.log || true
        
        echo ""
        echo "阶段 2: 执行增强修复..."
        # 创建修复脚本 - 完全不使用heredoc，使用多个echo命令
        {
          echo '#!/bin/bash'
          echo 'echo "执行增强修复..."'
          echo 'find .buildozer -name "*.pxi" -o -name "*.pyx" | while read file; do'
          echo '    echo "修复: $file"'
          echo '    # 修复模式1: isinstance(arg, long)'
          echo '    sed -i "s/isinstance(\\([^,]*\\),\\s*long)/isinstance(\\1, int)/g" "$file"'
          echo '    # 修复模式2: (int, long) 元组'
          echo '    sed -i "s/(int,\\s*long)/(int, int)/g" "$file"'
          echo '    sed -i "s/(int, long)/(int, int)/g" "$file"'
          echo '    # 修复模式3: isinstance(arg, (int, long))'
          echo '    sed -i "s/isinstance([^,]*,\\s*(int,\\s*long))/isinstance(\\1, (int, int))/g" "$file"'
          echo '    # 修复模式4: <long>'
          echo '    sed -i "s/<long>/<long long>/g" "$file"'
          echo 'done'
          echo 'echo "增强修复完成"'
        } > /tmp/fix_all_jnius.sh
        
        chmod +x /tmp/fix_all_jnius.sh
        /tmp/fix_all_jnius.sh
        
        echo ""
        echo "阶段 3: 修复后重新构建..."
        # 清理构建缓存，但保留修复后的源代码
        rm -rf .buildozer/android/platform/build-*/dists 2>/dev/null || true
        rm -rf .buildozer/android/platform/build-*/build 2>/dev/null || true
        
        # 修复后重新构建
        timeout 1200 buildozer -v android debug 2>&1 | tee second_build.log
        
        BUILD_EXIT=$?
        echo "构建最终退出代码: $BUILD_EXIT"
        
        # 搜索 APK 文件
        echo "=== 搜索 APK 文件 ==="
        mkdir -p bin
        APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null)
        APK_COUNT=0
        
        if [ -n "$APK_FILES" ]; then
            APK_COUNT=$(echo "$APK_FILES" | wc -l)
            echo "找到 $APK_COUNT 个 APK 文件:"
            echo "$APK_FILES"
            
            # 复制到 bin 目录
            echo "$APK_FILES" | head -1 | xargs -I {} cp {} bin/
            echo "已复制 APK 到 bin/ 目录:"
            ls -lh bin/*.apk
        else
            echo "未找到任何 APK 文件"
        fi
        
        # 输出构建结果
        if [ $APK_COUNT -gt 0 ]; then
            echo "✅ APK 构建成功！"
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
        else
            echo "❌ APK 构建失败"
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
            
            # 显示关键错误
            echo "=== 构建日志关键信息 ==="
            if [ -f "second_build.log" ]; then
                echo "最后 50 行日志:"
                tail -50 second_build.log
            fi
        fi
        
        echo "BUILD_EXIT_CODE=$BUILD_EXIT" >> $GITHUB_OUTPUT
        
        # 如果没有生成 APK，返回失败
        if [ $APK_COUNT -eq 0 ]; then
            exit 1
        fi

    - name: Upload APK artifact
      if: steps.build-step.outputs.APK_FOUND == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-logs
        path: |
          first_build.log
          second_build.log
          .buildozer/**/*.log
        retention-days: 5
