name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 40 # 设置超时，避免额度过度消耗

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    # 核心优化：添加缓存，大幅减少后续构建时间
    - name: Cache Buildozer and Android dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle/caches
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK with Automatic JNius Fix
      run: |
        echo "开始构建 APK..."
        echo "若缓存命中，构建将显著加快。"
        
        # 设置环境变量，确保工具链路径正确
        export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
        
        # 清理旧的构建输出，但保留已缓存的SDK/NDK
        rm -rf .buildozer/android/platform/build-* bin/ 2>/dev/null || true

        # 使用整合修复的构建脚本
        cat > build_final.sh << 'EOF'
#!/bin/bash
set -e

LOG_FILE="build.log"
echo "构建日志保存至: $LOG_FILE"

# 尝试第一次构建
echo "=== 第一次构建尝试 ==="
if timeout 1800 buildozer -v android debug 2>&1 | tee "$LOG_FILE"; then
    echo "✅ 首次构建成功！"
    exit 0
fi

# 如果失败，检查是否是 jnius 的 long 类型错误
if grep -q "undeclared name not builtin: long" "$LOG_FILE"; then
    echo "检测到 'jnius' 模块编译错误，正在尝试修复..."
    
    # 查找并修复 jnius_utils.pxi 文件
    find ~/.buildozer -name "jnius_utils.pxi" -type f 2>/dev/null | head -1 | while read -r JNIUS_FILE; do
        echo "修复文件: $JNIUS_FILE"
        cp "$JNIUS_FILE" "${JNIUS_FILE}.backup"
        # 将 isinstance(arg, long) 替换为 isinstance(arg, int)
        sed -i 's/isinstance(\([^,]*\),\s*long)/isinstance(\1, int)/g' "$JNIUS_FILE"
        # 将 C 类型 <long> 替换为 <long long>
        sed -i 's/<long>/<long long>/g' "$JNIUS_FILE"
        echo "修复完成。"
    done
    
    echo "=== 修复后重新构建 ==="
    rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
    if timeout 1800 buildozer -v android debug 2>&1 | tee -a "$LOG_FILE"; then
        echo "✅ 修复后构建成功！"
        exit 0
    else
        echo "❌ 修复后构建仍然失败。"
    fi
else
    echo "❌ 构建失败，但不是因为 'long' 类型错误。"
fi

# 最终失败处理
echo "=== 最后50行构建日志 ==="
tail -50 "$LOG_FILE"
exit 1
EOF

        chmod +x build_final.sh
        ./build_final.sh

        # 验证APK是否生成
        if find . -name "*.apk" -type f 2>/dev/null | grep -q .; then
            echo "✅ APK 构建成功！"
            mkdir -p bin
            find . -name "*-debug.apk" -type f -exec cp {} bin/ \;
            echo "生成的APK文件："
            ls -lh bin/*.apk
        else
            echo "❌ 错误：构建过程未生成任何APK文件。"
            echo "请查看上方日志或详细的 build.log 文件。"
            exit 1
        fi

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7

    - name: Upload Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-failure-logs
        path: |
          build.log
          .buildozer/**/*.log
        retention-days: 3
