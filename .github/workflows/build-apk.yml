name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libffi-dev \
          libssl-dev \
          zlib1g-dev
    
    - name: Install Buildozer with specific version
      run: |
        python -m pip install --upgrade pip
        # 安装特定版本的 buildozer 和 cython
        pip install "buildozer==1.5.0" "cython==0.29.36"
    
    - name: Pre-build setup
      run: |
        # 确保 main.py 存在
        if [ ! -f "main.py" ]; then
          echo "错误：未找到 main.py，请确保主脚本已正确命名"
          exit 1
        fi
        
        # 如果不存在 buildozer.spec，创建基本配置
        if [ ! -f "buildozer.spec" ]; then
          buildozer init
          echo "已创建 buildozer.spec，请根据需要进行修改"
        fi
    
    - name: Build APK with automatic fix
      run: |
        echo "开始构建 APK，将自动修复编译错误..."
        
        # 清理旧构建
        rm -rf bin/ .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 首次尝试构建
        timeout 1800 buildozer -v android debug 2>&1 | tee build_output.log || true
        
        # 检查是否有 jnius 错误
        if grep -q "undeclared name not builtin: long" build_output.log; then
          echo "检测到 'long' 类型错误，正在应用修复..."
          
          # 查找并修复 jnius_utils.pxi
          JNIUS_FILE=$(find ~/.buildozer -name "jnius_utils.pxi" -type f 2>/dev/null | head -1)
          
          if [ -n "$JNIUS_FILE" ]; then
            echo "找到 jnius_utils.pxi: $JNIUS_FILE"
            # 备份原文件
            cp "$JNIUS_FILE" "${JNIUS_FILE}.backup"
            # 修复 long 类型错误
            sed -i 's/isinstance(\([^,]*\),\s*long)/isinstance(\1, int)/g' "$JNIUS_FILE"
            echo "已修复 long 类型错误"
            
            # 重新构建
            echo "重新构建..."
            rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
            timeout 1800 buildozer -v android debug 2>&1 | tee build_output2.log
            
            if [ $? -eq 0 ]; then
              echo "✅ 修复成功！APK 构建完成"
              ls -la bin/*.apk 2>/dev/null || echo "APK 文件位置可能在其他目录"
            else
              echo "❌ 修复后构建仍然失败"
              tail -50 build_output2.log
              exit 1
            fi
          else
            echo "未找到 jnius_utils.pxi 文件"
            exit 1
          fi
        elif grep -q "BUILD SUCCESSFUL" build_output.log; then
          echo "✅ 首次构建成功！"
          ls -la bin/*.apk 2>/dev/null || echo "APK 文件位置可能在其他目录"
        else
          echo "❌ 构建失败，但不是因为 long 类型错误"
          tail -50 build_output.log
          exit 1
        fi
      timeout-minutes: 60
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build_output.log
          .buildozer/**/*.log
        retention-days: 3
