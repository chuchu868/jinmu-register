name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer

    - name: Validate files exist
      run: |
        echo "=== 验证必要文件 ==="
        echo "当前目录: $(pwd)"
        echo "文件列表:"
        ls -la
        
        if [ ! -f "main.py" ]; then
          echo "❌ 错误: 未找到 main.py"
          echo "请将 '网页式金木自动注册.py' 重命名为 'main.py'"
          exit 1
        fi
        
        if [ ! -f "buildozer.spec" ]; then
          echo "❌ 错误: 未找到 buildozer.spec"
          echo "请创建 buildozer.spec 文件"
          exit 1
        fi
        
        echo "✅ 所有必要文件都存在"

    - name: Clean previous builds
      run: |
        echo "清理之前的构建..."
        rm -rf .buildozer android .gradle 2>/dev/null || true

    # 关键步骤：构建 APK
    - name: Build APK
      id: build-apk
      run: |
        echo "=== 开始构建 APK ==="
        echo "这需要一些时间，首次构建可能需要10-30分钟..."
        
        # 显示详细输出
        set -x
        
        # 执行构建命令
        timeout 1800 buildozer -v android debug 2>&1 | tee build.log
        
        # 检查构建结果
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "构建退出代码: $BUILD_EXIT_CODE"
        
        # 查找生成的APK
        APK_FOUND=false
        if find . -name "*.apk" -type f 2>/dev/null | grep -q .; then
          echo "✅ 找到 APK 文件"
          APK_FOUND=true
          # 复制到 bin 目录
          mkdir -p bin
          find . -name "*.apk" -type f -exec cp {} bin/ \;
          echo "APK 文件列表:"
          ls -lh bin/*.apk 2>/dev/null || find . -name "*.apk" -type f
        else
          echo "❌ 未找到 APK 文件"
          echo "=== 构建日志最后100行 ==="
          tail -100 build.log
        fi
        
        echo "APK_FOUND=$APK_FOUND" >> $GITHUB_OUTPUT
        exit $BUILD_EXIT_CODE
      timeout-minutes: 30

    - name: Upload APK artifact
      if: steps.build-apk.outputs.APK_FOUND == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
        retention-days: 5
