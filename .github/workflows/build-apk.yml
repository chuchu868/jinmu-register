name: Build Android APK (With Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer

    - name: Fix jnius before build
      run: |
        echo "=== 修复 jnius 模块 ==="
        
        # 尝试先下载python-for-android
        echo "下载python-for-android..."
        buildozer android update 2>&1 | tail -20 || true
        
        # 查找并修复jnius文件
        echo "查找jnius_utils.pxi文件..."
        sleep 5
        
        JNIUS_FILE=$(find ~/.buildozer -name "jnius_utils.pxi" -type f 2>/dev/null | head -1)
        
        if [ -n "$JNIUS_FILE" ]; then
          echo "找到文件: $JNIUS_FILE"
          echo "应用修复..."
          sed -i 's/isinstance(\([^,]*\),\s*long)/isinstance(\1, int)/g' "$JNIUS_FILE"
          echo "修复完成"
        else
          echo "未找到jnius文件，继续构建"
        fi

    - name: Build APK
      id: build-step
      run: |
        echo "=== 开始构建 ==="
        
        rm -rf .buildozer/android/platform/build-* bin/ 2>/dev/null || true
        
        buildozer -v android debug 2>&1 | tee build_output.log
        
        # 检查APK是否生成
        if find . -name "*.apk" -type f 2>/dev/null | grep -q .; then
          echo "✅ APK生成成功"
          mkdir -p bin
          find . -name "*.apk" -type f -exec cp {} bin/ \;
          echo "APK_FOUND=true" >> $GITHUB_OUTPUT
        else
          echo "❌ 未生成APK"
          echo "APK_FOUND=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload APK
      if: steps.build-step.outputs.APK_FOUND == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-apk
        path: bin/*.apk
        retention-days: 7

    - name: Upload logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build_output.log
        retention-days: 3
