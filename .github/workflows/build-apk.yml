name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Cache Buildozer and Android dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
          ~/.gradle/caches
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    - name: Build APK
      run: |
        echo "开始构建APK..."
        echo "工作目录: $(pwd)"
        echo "文件列表:"
        ls -la
        
        # 清理之前的构建
        rm -rf bin/ .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 构建APK
        timeout 2400 buildozer -v android debug 2>&1 | tee build.log
        
        # 检查构建结果
        if [ $? -eq 0 ] && [ -f "bin/*.apk" ]; then
          echo "✅ APK构建成功!"
          echo "生成的APK文件:"
          find bin/ -name "*.apk" -type f 2>/dev/null | xargs ls -lh
        else
          echo "❌ APK构建失败!"
          echo "错误日志:"
          tail -100 build.log
          exit 1
        fi

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7

    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build.log
          .buildozer/**/*.log
        retention-days: 3
