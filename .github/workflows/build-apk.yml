name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk
    
    - name: Install Buildozer
      run: |
        pip install buildozer
    
    - name: Clean buildozer.spec
      run: |
        # 确保没有行内注释
        if [ -f "buildozer.spec" ]; then
          # 删除所有行内注释（#后面的内容），但保留整行注释
          sed -i 's/[[:space:]]*#.*$//' buildozer.spec
          # 删除空行
          sed -i '/^[[:space:]]*$/d' buildozer.spec
          echo "清理后的 buildozer.spec:"
          cat buildozer.spec
        fi
        
        # 确保 main.py 存在
        if [ ! -f "main.py" ]; then
          echo "错误：需要 main.py 文件"
          exit 1
        fi
    
    - name: Build APK
      run: |
        echo "开始构建 APK..."
        echo "当前目录: $(pwd)"
        echo "文件列表:"
        ls -la
        
        # 清理旧构建
        rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 构建 APK
        buildozer -v android debug 2>&1 | tee build.log
        
        if [ $? -eq 0 ]; then
          echo "✅ 构建成功!"
          ls -la bin/*.apk 2>/dev/null || find . -name "*.apk" -type f
        else
          echo "❌ 构建失败"
          echo "最后50行错误:"
          tail -50 build.log
          exit 1
        fi
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
        retention-days: 7
    
    - name: Upload logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build.log
