name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Pre-download and fix jnius
      run: |
        echo "=== 步骤1: 预下载python-for-android ==="
        # 仅下载不构建
        buildozer android update 2>&1 | tail -30 || true
        
        echo "=== 步骤2: 等待文件下载完成 ==="
        sleep 10
        
        echo "=== 步骤3: 查找并修复 jnius_utils.pxi ==="
        # 查找文件
        JNIUS_FILE=$(find ~/.buildozer -name "jnius_utils.pxi" -type f 2>/dev/null | head -1)
        
        if [ -n "$JNIUS_FILE" ]; then
          echo "找到文件: $JNIUS_FILE"
          echo "备份原文件..."
          cp "$JNIUS_FILE" "${JNIUS_FILE}.backup"
          
          echo "应用修复..."
          # 修复方案1: 替换 isinstance(arg, long)
          sed -i 's/isinstance(\([^,]*\),\s*long)/isinstance(\1, int)/g' "$JNIUS_FILE"
          # 修复方案2: 替换 <long> 类型
          sed -i 's/<long>/<long long>/g' "$JNIUS_FILE"
          
          echo "验证修复结果:"
          grep -n "long" "$JNIUS_FILE" || echo "✅ 文件中已无 'long' 关键字"
        else
          echo "❌ 未找到 jnius_utils.pxi 文件"
          echo "尝试手动查找..."
          find ~/.buildozer -name "*.pxi" -type f 2>/dev/null
        fi

    - name: Build APK
      id: build-step
      run: |
        echo "=== 开始构建 APK ==="
        echo "首次构建可能需要 10-20 分钟..."
        
        # 清理旧构建
        rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 执行构建
        timeout 1800 buildozer -v android debug 2>&1 | tee full_build.log
        BUILD_STATUS=${PIPESTATUS[0]}
        
        echo "构建退出代码: $BUILD_STATUS"
        
        # 搜索APK文件
        APK_FILES=$(find . -name "*.apk" -type f 2>/dev/null)
        APK_COUNT=$(echo "$APK_FILES" | wc -w 2>/dev/null || echo 0)
        
        if [ $APK_COUNT -gt 0 ]; then
          echo "✅ 找到 $APK_COUNT 个 APK 文件"
          echo "$APK_FILES"
          mkdir -p bin
          # 复制第一个APK到bin目录
          echo "$APK_FILES" | head -1 | xargs -I {} cp {} bin/
          echo "APK_FOUND=true" >> $GITHUB_OUTPUT
        else
          echo "❌ 未找到 APK 文件"
          echo "APK_FOUND=false" >> $GITHUB_OUTPUT
          echo "=== 错误摘要 ==="
          tail -50 full_build.log
        fi

    - name: Upload APK
      if: steps.build-step.outputs.APK_FOUND == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: full_build.log
        retention-days: 5
