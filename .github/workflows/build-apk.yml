name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK with Real-time Fix
      id: build-step
      run: |
        echo "=== 开始构建，并准备实时修复 ==="
        rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 创建一个封装脚本，用于在构建过程中捕获并修复错误
        cat > build_with_fix.sh << 'EOF'
#!/bin/bash
set -e

LOG_FILE="full_build.log"
# 启动 buildozer，并将其输出同时写入日志文件和屏幕
buildozer -v android debug 2>&1 | tee "$LOG_FILE" | while IFS= read -r line; do
    echo "$line"
    # 关键：实时检测日志中是否出现 'long' 类型错误
    if echo "$line" | grep -q "undeclared name not builtin: long"; then
        echo "⚠️ 检测到 'long' 类型编译错误，正在尝试实时修复..."
        
        # 立即查找并修复 jnius_utils.pxi
        # 此时文件肯定已被下载到构建目录中
        JNIUS_FILE=$(find .buildozer -name "jnius_utils.pxi" -type f 2>/dev/null | head -1)
        
        if [ -n "$JNIUS_FILE" ] && [ -f "$JNIUS_FILE" ]; then
            echo "  找到文件: $JNIUS_FILE"
            echo "  应用修复..."
            sed -i 's/isinstance(\([^,]*\),\s*long)/isinstance(\1, int)/g' "$JNIUS_FILE"
            sed -i 's/<long>/<long long>/g' "$JNIUS_FILE"
            echo "  ✅ 实时修复完成。构建将继续。"
        else
            echo "  ❌ 错误：无法找到文件进行实时修复。"
        fi
    fi
done

# 检查最终构建结果
BUILD_EXIT_CODE=${PIPESTATUS[0]}
EOF

        chmod +x build_with_fix.sh
        # 执行封装脚本，给予足够超时时间
        timeout 1200 ./build_with_fix.sh
        
        BUILD_EXIT_CODE=$?
        echo "构建最终退出代码: $BUILD_EXIT_CODE"
        
        # 无论构建结果如何，都尝试查找 APK
        echo "=== 搜索 APK 文件 ==="
        mkdir -p bin
        if find . -name "*.apk" -type f -exec cp {} bin/ \; 2>/dev/null; then
            APK_COUNT=$(ls -1 bin/*.apk 2>/dev/null | wc -l)
        else
            APK_COUNT=0
        fi
        
        if [ $APK_COUNT -gt 0 ]; then
            echo "✅ 成功！找到 $APK_COUNT 个 APK 文件。"
            ls -lh bin/*.apk
            echo "APK_FOUND=true" >> $GITHUB_OUTPUT
        else
            echo "❌ 未找到 APK 文件。"
            echo "APK_FOUND=false" >> $GITHUB_OUTPUT
            # 显示关键错误，帮助诊断
            echo "=== 构建日志关键错误摘要 ==="
            grep -i -B2 -A2 "error\|failed\|long" full_build.log | tail -30
        fi
        
        # 保存构建状态
        echo "BUILD_EXIT_CODE=$BUILD_EXIT_CODE" >> $GITHUB_OUTPUT
        
        # 关键：如果没生成APK，即使脚本没报错，也标记为失败
        if [ $APK_COUNT -eq 0 ]; then
            exit 1
        fi

    - name: Upload APK Artifact
      if: steps.build-step.outputs.APK_FOUND == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7

    - name: Upload Logs for Diagnosis
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-full
        path: full_build.log
        retention-days: 5
