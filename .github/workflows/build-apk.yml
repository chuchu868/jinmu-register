name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          libffi-dev \
          libssl-dev \
          zlib1g-dev
    
    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    
    - name: Clean and validate buildozer.spec
      run: |
        echo "清理 buildozer.spec 文件中的注释..."
        
        # 移除行内注释（保留整行注释）
        if [ -f "buildozer.spec" ]; then
          # 备份原文件
          cp buildozer.spec buildozer.spec.backup
          
          # 移除行内注释，但保留整行注释
          awk '
            {
              # 处理每一行
              line = $0
              
              # 如果整行都是注释，保留它
              if (line ~ /^[[:space:]]*#/) {
                print line
              }
              else {
                # 移除行内的注释
                split(line, parts, "#")
                print parts[1]
              }
            }
          ' buildozer.spec.backup > buildozer.spec
          
          echo "清理后的 buildozer.spec 文件："
          echo "=================================="
          cat buildozer.spec
          echo "=================================="
        else
          echo "错误：未找到 buildozer.spec 文件"
          exit 1
        fi
        
        # 验证 main.py 文件是否存在
        if [ ! -f "main.py" ]; then
          echo "错误：未找到 main.py 文件"
          echo "请确保已将 '网页式金木自动注册.py' 重命名为 'main.py'"
          exit 1
        fi
    
    - name: Build APK
      run: |
        echo "开始构建 APK..."
        echo "当前目录：$(pwd)"
        echo "文件列表："
        ls -la
        
        # 清理之前的构建
        rm -rf bin/ .buildozer/android/platform/build-* 2>/dev/null || true
        
        # 设置构建超时（首次构建可能需要较长时间）
        timeout 2400 buildozer -v android debug
        
        # 检查构建结果
        if [ $? -eq 0 ]; then
          echo "✅ APK 构建成功！"
          echo "生成的 APK 文件："
          find bin/ -name "*.apk" -type f 2>/dev/null | xargs ls -lh || echo "未找到 APK 文件"
        else
          echo "❌ APK 构建失败"
          echo "请检查 .buildozer 目录中的日志文件获取更多信息"
          exit 1
        fi
      timeout-minutes: 40
    
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jinmu-register-apk
        path: bin/*.apk
        retention-days: 7
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/**/*.log
        retention-days: 3
